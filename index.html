<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arash Famiilirani</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style id="theme-styles">
        /* Default values – will be overridden by JS */
        :root {
            --bg: #ffffff;
            --text: #111111;
            --accent: #000000;
            --heading-font: 'Cormorant Garamond', serif;
            --body-font: 'Inter', sans-serif;
            --heading-size: 4.5rem;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--body-font);
            font-weight: 300;
            line-height: 1.5;
            transition: background 0.2s, color 0.2s;
        }
        /* Header with nav */
        .site-header {
            position: sticky;
            top: 0;
            background: var(--bg);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            z-index: 100;
            backdrop-filter: blur(8px);
        }
        .site-title {
            font-family: var(--heading-font);
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: var(--text);
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .nav-links a {
            font-family: var(--body-font);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text);
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: var(--accent);
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 2rem 6rem;
        }
        .module {
            margin-bottom: 6rem;
            scroll-margin-top: 100px;
        }
        .text_block h1, .text_block h2, .text_block h3 {
            font-family: var(--heading-font);
            font-weight: 400;
        }
        .text_block h1 {
            font-size: var(--heading-size);
            line-height: 1.1;
            margin: 2rem 0 1rem;
        }
        .text_block p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            max-width: 85%;
        }
        .video_block iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            background: #f0f0f0;
        }
        .audio_block {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .audio-item iframe {
            width: 100%;
            height: 166px;
            border: none;
        }
        .caption {
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text);
            opacity: 0.7;
            margin-top: 0.5rem;
        }
        @media (max-width: 768px) {
            .site-header { flex-direction: column; gap: 0.5rem; text-align: center; }
            .nav-links { justify-content: center; }
            .text_block p { max-width: 100%; }
            .text_block h1 { font-size: calc(var(--heading-size) * 0.7); }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="site-title" id="logo-text">ARASH FAMIILIRANI</div>
        <div class="nav-links" id="nav-links"></div>
    </header>
    <main class="container" id="content-modules"></main>

    <script>
        async function buildSite() {
            try {
                const res = await fetch('/content/settings.json');
                if (!res.ok) throw new Error('Settings not found');
                const data = await res.json();
                
                // Apply theme settings
                if (data.theme) {
                    const root = document.documentElement.style;
                    if (data.theme.bg) root.setProperty('--bg', data.theme.bg);
                    if (data.theme.text) root.setProperty('--text', data.theme.text);
                    if (data.theme.accent) root.setProperty('--accent', data.theme.accent);
                    if (data.theme.heading_font) root.setProperty('--heading-font', data.theme.heading_font);
                    if (data.theme.body_font) root.setProperty('--body-font', data.theme.body_font);
                    if (data.theme.heading_size) root.setProperty('--heading-size', data.theme.heading_size);
                }

                document.getElementById('logo-text').textContent = data.site_name || 'ARASH FAMIILIRANI';
                const container = document.getElementById('content-modules');
                container.innerHTML = '';
                const modules = data.modules || [];

                // Build modules and collect navigation items
                const navItems = [];
                modules.forEach((m, idx) => {
                    const section = document.createElement('section');
                    section.className = `module ${m.type}`;
                    const anchorId = `module-${idx}`;
                    section.id = anchorId;
                    
                    let navLabel = '';
                    if (m.type === 'text_block') {
                        // Use title if provided, else fallback to first heading or index
                        navLabel = m.title || `Section ${idx+1}`;
                        section.innerHTML = marked.parse(m.body || '');
                    } else if (m.type === 'video_block') {
                        navLabel = m.caption || `Video ${idx+1}`;
                        section.innerHTML = `
                            <iframe src="${m.url}" frameborder="0" allowfullscreen></iframe>
                            <div class="caption">${m.caption || ''}</div>
                        `;
                    } else if (m.type === 'audio_block') {
                        navLabel = m.caption || `Audio ${idx+1}`;
                        const tracks = (m.items || []).map(track => `
                            <div class="audio-item">
                                <iframe src="${track.url}" frameborder="0" scrolling="no"></iframe>
                                <div class="caption">${track.caption || ''}</div>
                            </div>
                        `).join('');
                        section.innerHTML = tracks;
                    }
                    container.appendChild(section);
                    navItems.push({ label: navLabel, id: anchorId });
                });

                // Build navigation links
                const navContainer = document.getElementById('nav-links');
                navContainer.innerHTML = navItems.map(item => 
                    `<a href="#${item.id}">${item.label}</a>`
                ).join('');
                
                // Smooth scroll for anchor links
                document.querySelectorAll('.nav-links a').forEach(link => {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        const targetId = link.getAttribute('href').substring(1);
                        const target = document.getElementById(targetId);
                        if (target) {
                            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    });
                });
            } catch (err) {
                console.warn('Awaiting CMS publish…', err);
                document.getElementById('content-modules').innerHTML = '<p style="color: #888;">Content will appear after you publish from the admin panel.</p>';
            }
        }
        buildSite();
    </script>
</body>
</html>
