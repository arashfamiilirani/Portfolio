<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arash Famiilirani</title>
    <!-- Google Fonts: choose a clean serif + sans for captions -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #ffffff;
            color: #111111;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        /* Minimal header */
        .site-header {
            padding: 2rem 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid #eee;
            margin-bottom: 4rem;
        }
        .site-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: -0.01em;
            color: #111;
            text-decoration: none;
        }
        /* Main content container */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 2rem 6rem;
        }
        /* Each module gets generous spacing */
        .module {
            margin-bottom: 8rem;
        }
        /* Text block – Yulia Mahr loves big serif text */
        .text_block h1,
        .text_block h2,
        .text_block h3 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 400;
            letter-spacing: -0.02em;
        }
        .text_block h1 {
            font-size: 4.5rem;
            line-height: 1.1;
            margin: 2rem 0 1rem;
        }
        .text_block h2 {
            font-size: 2.2rem;
            margin: 2.5rem 0 1rem;
            color: #333;
        }
        .text_block p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            color: #2c2c2c;
            max-width: 85%;
        }
        .text_block blockquote {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-style: italic;
            border-left: 2px solid #ccc;
            padding-left: 2rem;
            margin: 2.5rem 0;
            color: #444;
        }
        /* Media blocks – minimal and centered */
        .video_block iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            background: #f5f5f5;
            transition: opacity 0.3s ease;
        }
        .audio_block {
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }
        .audio-item {
            width: 100%;
        }
        .audio-item iframe {
            width: 100%;
            height: 166px;
            border: none;
        }
        .caption {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #888;
            margin-top: 0.75rem;
            text-align: left;
        }
        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 0 1.5rem 4rem; }
            .text_block p { max-width: 100%; }
            .text_block h1 { font-size: 3rem; }
            .site-header { padding: 1.5rem; margin-bottom: 2rem; }
            .module { margin-bottom: 5rem; }
        }
        /* subtle fade-in */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .module {
            animation: fadeUp 0.8s ease forwards;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="site-title" id="logo-text">ARASH FAMIILIRANI</div>
    </header>
    <main class="container" id="content-modules">
        <!-- Dynamic content will be injected here -->
    </main>

    <script>
        async function buildSite() {
            try {
                const res = await fetch('/content/settings.json');
                if (!res.ok) throw new Error('Settings not found');
                const data = await res.json();
                document.getElementById('logo-text').textContent = data.site_name || 'ARASH FAMIILIRANI';
                const container = document.getElementById('content-modules');
                container.innerHTML = ''; // clear any placeholder

                const modules = data.modules || [];
                for (const m of modules) {
                    const section = document.createElement('section');
                    section.className = `module ${m.type}`;
                    
                    if (m.type === 'text_block') {
                        // Render markdown (using marked)
                        section.innerHTML = marked.parse(m.body || '');
                    } 
                    else if (m.type === 'video_block') {
                        section.innerHTML = `
                            <iframe src="${m.url}" frameborder="0" allowfullscreen></iframe>
                            <div class="caption">${m.caption || ''}</div>
                        `;
                    }
                    else if (m.type === 'audio_block') {
                        const tracks = (m.items || []).map(track => `
                            <div class="audio-item">
                                <iframe src="${track.url}" frameborder="0" scrolling="no"></iframe>
                                <div class="caption">${track.caption || ''}</div>
                            </div>
                        `).join('');
                        section.innerHTML = tracks;
                    }
                    container.appendChild(section);
                }
            } catch (err) {
                console.warn('Awaiting CMS publish…', err);
                document.getElementById('content-modules').innerHTML = '<p style="color: #888;">Content will appear after you publish from the admin panel.</p>';
            }
        }
        buildSite();
    </script>
</body>
</html>
