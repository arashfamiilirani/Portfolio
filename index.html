<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arash Famiilirani</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style id="theme-styles">
        :root {
            --bg: #ffffff;
            --text: #111111;
            --accent: #000000;
            --heading-font: 'Cormorant Garamond', serif;
            --body-font: 'Inter', sans-serif;
            --heading-size: 4.5rem;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--body-font);
            font-weight: 300;
            line-height: 1.5;
        }
        /* Header */
        .site-header {
            position: sticky;
            top: 0;
            background: var(--bg);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            z-index: 100;
            backdrop-filter: blur(8px);
        }
        .site-title {
            font-family: var(--heading-font);
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: var(--text);
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .nav-links a {
            font-family: var(--body-font);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: var(--accent);
        }
        .social-icons {
            display: flex;
            gap: 1rem;
            margin-left: 1rem;
        }
        .social-icons a {
            font-size: 1.2rem;
            color: var(--text);
            text-decoration: none;
        }
        .social-icons a:hover {
            color: var(--accent);
        }
        /* Main content */
        .main-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 2rem 6rem;
        }
        /* Hero */
        .hero img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .hero .credit {
            font-size: 0.75rem;
            color: var(--text);
            opacity: 0.6;
            margin-top: 0.5rem;
            text-align: center;
        }
        /* Sections (hidden by default) */
        .section {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .section.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Bio */
        .bio h1 {
            font-size: var(--heading-size);
            line-height: 1.1;
            margin: 2rem 0 1rem;
        }
        .bio p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            max-width: 85%;
        }
        /* Video reel: grid vs list */
        .video_reel .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 1.5rem;
        }
        .video_reel .video-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-top: 1.5rem;
        }
        .video-item iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            background: #f0f0f0;
        }
        /* Audio sections */
        .music .audio-grid, .sound_design .audio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 1.5rem;
        }
        .music .audio-list, .sound_design .audio-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-top: 1.5rem;
        }
        .audio-item iframe {
            width: 100%;
            height: 166px;
            border: none;
        }
        .caption {
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text);
            opacity: 0.7;
            margin-top: 0.5rem;
        }
        @media (max-width: 768px) {
            .site-header { flex-direction: column; gap: 0.5rem; text-align: center; }
            .nav-links { justify-content: center; }
            .social-icons { margin-left: 0; justify-content: center; }
            .bio p { max-width: 100%; }
            .bio h1 { font-size: calc(var(--heading-size) * 0.7); }
            .video-grid, .audio-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="site-title" id="logo-text">ARASH FAMIILIRANI</div>
        <div class="nav-links" id="nav-links"></div>
        <div class="social-icons" id="social-icons"></div>
    </header>
    <main class="main-content" id="main-content"></main>

    <script>
        async function buildSite() {
            try {
                const res = await fetch('/content/settings.json');
                if (!res.ok) throw new Error('Settings not found');
                const data = await res.json();

                // Apply theme
                if (data.theme) {
                    const root = document.documentElement.style;
                    if (data.theme.bg) root.setProperty('--bg', data.theme.bg);
                    if (data.theme.text) root.setProperty('--text', data.theme.text);
                    if (data.theme.accent) root.setProperty('--accent', data.theme.accent);
                    if (data.theme.heading_font) root.setProperty('--heading-font', data.theme.heading_font);
                    if (data.theme.body_font) root.setProperty('--body-font', data.theme.body_font);
                    if (data.theme.heading_size) root.setProperty('--heading-size', data.theme.heading_size);
                }

                // Site name
                document.getElementById('logo-text').textContent = data.site_name || 'ARASH FAMIILIRANI';

                // Social icons
                const social = data.social_links || {};
                const socialContainer = document.getElementById('social-icons');
                const socialLinks = [];
                if (social.instagram) socialLinks.push(`<a href="${social.instagram}" target="_blank"><i class="fab fa-instagram"></i></a>`);
                if (social.youtube) socialLinks.push(`<a href="${social.youtube}" target="_blank"><i class="fab fa-youtube"></i></a>`);
                if (social.soundcloud) socialLinks.push(`<a href="${social.soundcloud}" target="_blank"><i class="fab fa-soundcloud"></i></a>`);
                if (social.spotify) socialLinks.push(`<a href="${social.spotify}" target="_blank"><i class="fab fa-spotify"></i></a>`);
                if (social.email) socialLinks.push(`<a href="mailto:${social.email}"><i class="fas fa-envelope"></i></a>`);
                socialContainer.innerHTML = socialLinks.join('');

                // Hero
                const hero = data.hero || {};
                const heroHtml = `
                    <div class="hero" id="hero-section">
                        ${hero.image ? `<img src="${hero.image}" alt="Hero">` : ''}
                        ${hero.credit ? `<div class="credit">${hero.credit}</div>` : ''}
                    </div>
                `;

                // Build sections
                const sections = data.sections || [];
                const mainContainer = document.getElementById('main-content');
                mainContainer.innerHTML = heroHtml;

                const sectionsData = [];

                sections.forEach((section, idx) => {
                    const sectionId = `section-${idx}`;
                    let contentHtml = '';
                    let title = section.title || 'Untitled';

                    if (section.type === 'bio') {
                        contentHtml = marked.parse(section.body || '');
                    } 
                    else if (section.type === 'video_reel') {
                        const videos = section.videos || [];
                        const layout = section.layout === 'grid' ? 'video-grid' : 'video-list';
                        contentHtml = `
                            <h2 class="section-title">${section.title}</h2>
                            <div class="${layout}">
                                ${videos.map(v => `
                                    <div class="video-item">
                                        <iframe src="${v.url}" frameborder="0" allowfullscreen></iframe>
                                        ${v.caption ? `<div class="caption">${v.caption}</div>` : ''}
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }
                    else if (section.type === 'music') {
                        const tracks = section.tracks || [];
                        const layout = section.layout === 'grid' ? 'audio-grid' : 'audio-list';
                        contentHtml = `
                            <h2 class="section-title">${section.title}</h2>
                            <div class="${layout}">
                                ${tracks.map(t => `
                                    <div class="audio-item">
                                        <iframe src="${t.url}" frameborder="0" scrolling="no"></iframe>
                                        ${t.caption ? `<div class="caption">${t.caption}</div>` : ''}
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }
                    else if (section.type === 'sound_design') {
                        const tracks = section.tracks || [];
                        const layout = section.layout === 'grid' ? 'audio-grid' : 'audio-list';
                        contentHtml = `
                            <h2 class="section-title">${section.title}</h2>
                            <div class="${layout}">
                                ${tracks.map(t => `
                                    <div class="audio-item">
                                        <iframe src="${t.url}" frameborder="0" scrolling="no"></iframe>
                                        ${t.caption ? `<div class="caption">${t.caption}</div>` : ''}
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }
                    else if (section.type === 'contact') {
                        contentHtml = `
                            <h2 class="section-title">${section.title}</h2>
                            ${section.text ? marked.parse(section.text) : '<p>Contact me via the social links above.</p>'}
                        `;
                    }

                    const sectionDiv = document.createElement('div');
                    sectionDiv.id = sectionId;
                    sectionDiv.className = `section ${section.type}`;
                    sectionDiv.innerHTML = contentHtml;
                    mainContainer.appendChild(sectionDiv);
                    sectionsData.push({ id: sectionId, title: title });
                });

                // Navigation
                const navContainer = document.getElementById('nav-links');
                navContainer.innerHTML = `<a data-section="hero">Home</a>` + 
                    sectionsData.map(item => `<a data-section="${item.id}">${item.title}</a>`).join('');

                // Click handlers
                document.querySelectorAll('.nav-links a').forEach(link => {
                    link.addEventListener('click', (e) => {
                        const targetId = link.getAttribute('data-section');
                        const hero = document.getElementById('hero-section');
                        const sections = document.querySelectorAll('.section');
                        if (targetId === 'hero') {
                            hero.style.display = 'block';
                            sections.forEach(s => s.classList.remove('active'));
                        } else {
                            hero.style.display = 'none';
                            sections.forEach(s => s.classList.remove('active'));
                            const activeSection = document.getElementById(targetId);
                            if (activeSection) activeSection.classList.add('active');
                        }
                    });
                });

                // Initial state: show hero
                document.getElementById('hero-section').style.display = 'block';
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));

            } catch (err) {
                console.warn('Awaiting CMS publish…', err);
                document.getElementById('main-content').innerHTML = '<p style="color: #888;">Content will appear after you publish from the admin panel.</p>';
            }
        }
        buildSite();
    </script>
</body>
</html>
