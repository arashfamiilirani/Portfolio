<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #f1f704; --text: #fff; --text-dim: #888; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; min-height: 110vh; }
        
        header { 
            position: sticky; top: 0; display: flex; justify-content: space-between; 
            padding: 20px 5%; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid #222; z-index: 1000;
        }

        .container { max-width: 1200px; margin: 50px auto; padding: 20px; display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }
        .card { background: #111; border: 1px solid #222; border-radius: 24px; padding: 40px; }
        .hero { grid-column: span 8; }
        .bio { grid-column: span 4; }
        .wide { grid-column: span 12; }
        
        .tag { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; text-transform: uppercase; }
        h1 { font-size: 0.9rem; letter-spacing: 3px; margin: 0; }
        h2 { font-size: 2.5rem; margin: 10px 0; letter-spacing: -0.02em; }
    </style>
</head>
<body>

<header>
    <div class="logo"><h1 id="display-name">LOADING...</h1></div>
    <nav style="font-size: 0.7rem; letter-spacing: 2px; color: var(--text-dim);">PORTFOLIO</nav>
</header>

<main class="container">
    <section class="card hero">
        <span class="tag" id="display-title">Title</span>
        <h2 id="display-hero-name">Name</h2>
        <p id="display-location" style="color: var(--text-dim)"></p>
    </section>

    <section class="card bio">
        <span class="tag">About</span>
        <p id="display-bio" style="line-height: 1.8;"></p>
    </section>

    <section class="card wide">
        <span class="tag">Works</span>
        <div id="portfolio-list">Projects appear here.</div>
    </section>
</main>

<script>
    async function syncContent() {
        try {
            const res = await fetch('/content/settings.json');
            const data = await res.json();
            
            // MAP DATA TO PAGE
            document.getElementById('display-name').textContent = data.site_name || "ARASH IRANI";
            document.getElementById('display-hero-name').textContent = data.site_name || "ARASH IRANI";
            document.getElementById('display-title').textContent = data.site_title || "Sound Artist";
            document.getElementById('display-location').textContent = data.location || "Montreal, QC";
            document.getElementById('display-bio').textContent = data.bio_text || "Bio goes here...";
            
            if (data.accent) document.documentElement.style.setProperty('--accent', data.accent);
            if (data.css) {
                const style = document.createElement('style');
                style.textContent = data.css;
                document.head.appendChild(style);
            }
        } catch (e) { console.log("First time? Edit settings in dashboard."); }
    }
    syncContent();
</script>

</body>
</html>
