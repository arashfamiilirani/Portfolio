<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arash Irani | Sound Artist & Composer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --accent: #f1f704;
            --text-main: #f5f5f7;
            --text-dim: #86868b;
            --panel: rgba(28, 28, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* APPLE-STYLE STICKY HEADER */
        header {
            position: sticky;
            top: 0;
            z-index: 9999;
            padding: 20px 5vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo h1 {
            font-size: 1rem;
            letter-spacing: 4px;
            font-weight: 600;
            margin: 0;
            text-transform: uppercase;
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-left: 30px;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        /* BENTO GRID LAYOUT */
        .container {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 24px;
            max-width: 1250px;
            margin: 60px auto;
            padding: 0 40px;
        }

        .card {
            background: var(--panel);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* PANEL SIZES (The Apple Look) */
        .hero-card { grid-column: span 8; min-height: 450px; }
        .bio-card { grid-column: span 4; min-height: 450px; }
        .wide-card { grid-column: span 12; min-height: 300px; }

        @media (max-width: 900px) {
            .hero-card, .bio-card, .wide-card { grid-column: span 12; }
        }

        .tag {
            background: rgba(255,255,255,0.1);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
