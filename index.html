<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #000; --text: #fff; --dim: #666; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; font-weight: 200; }
        
        header { 
            position: fixed; top: 0; width: 100%; padding: 40px; 
            display: flex; justify-content: space-between; z-index: 1000;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
        }

        .logo { font-size: 0.8rem; letter-spacing: 6px; text-transform: uppercase; font-weight: 600; }
        nav { display: flex; gap: 30px; }
        nav a { color: var(--dim); text-decoration: none; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; }

        .container { max-width: 1400px; margin: 0 auto; padding: 200px 40px; }
        .module { margin-bottom: 150px; }

        /* Editorial Text */
        .text-block h2 { font-size: 4rem; font-weight: 200; letter-spacing: -0.05em; margin-bottom: 40px; line-height: 1; }
        .text-block.Narrow { max-width: 700px; }
        .body-text { font-size: 1.2rem; line-height: 1.8; color: #ccc; }

        /* Media Grid */
        .grid { display: grid; gap: 40px; }
        .cols-1 { grid-template-columns: 1fr; }
        .cols-2 { grid-template-columns: 1fr 1fr; }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; filter: grayscale(0.2); transition: 0.5s; }
        iframe:hover { filter: grayscale(0); }
    </style>
</head>
<body>
    <header>
        <div class="logo" id="logo-target">LOADING</div>
        <nav id="nav-target"></nav>
    </header>
    <main class="container" id="content-target"></main>

    <script>
        async function load() {
            const res = await fetch('/content/settings.json');
            const data = await res.json();
            document.getElementById('logo-target').textContent = data.site_name || "ARASH IRANI";

            const content = document.getElementById('content-target');
            const nav = document.getElementById('nav-target');

            (data.modules || []).forEach((m, i) => {
                const id = `sec-${i}`;
                if (m.nav_label) nav.innerHTML += `<a href="#${id}">${m.nav_label}</a>`;

                const section = document.createElement('div');
                section.className = 'module';
                section.id = id;

                if (m.type === 'text_block') {
                    section.innerHTML = `<div class="text-block ${m.width}">
                        ${m.heading ? `<h2>${m.heading}</h2>` : ''}
                        <div class="body-text">${marked.parse(m.body || '')}</div>
                    </div>`;
                } else if (m.type === 'media_block') {
                    const items = (m.items || []).map(item => `
                        <div>
                            <iframe src="${item.url}" style="${item.url.includes('soundcloud') ? 'height:166px; aspect-ratio:auto;' : ''}"></iframe>
                            <p style="font-size: 10px; color: #555; margin-top: 10px; letter-spacing: 1px;">${item.caption || ''}</p>
                        </div>`).join('');
                    section.innerHTML = `<div class="grid cols-${m.cols}">${items}</div>`;
                }
                content.appendChild(section);
            });
        }
        load();
    </script>
</body>
</html>
