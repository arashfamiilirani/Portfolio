<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arash Irani - Sound Artist</title>
  <style>
    body { margin:0; font-family: Arial; background:#0d0d0d; color:#f5f5f5;}
    header {padding:40px; text-align:center; border-bottom:1px solid #222;}
    section {padding:60px 20px; max-width:900px; margin:auto;}
    .project {margin-bottom:40px; border-bottom:1px solid #222; padding-bottom:20px;}
    iframe {width:100%; height:200px; border:none;}
  </style>
</head>
<body>
<header>
  <h1>Arash Irani</h1>
  <p>Sound Artist / Composer / Sound Designer</p>
</header>

<section>
  <h2>Projects</h2>
  <div id="projects"></div>
</section>

<script>
async function loadProjects() {
  const res = await fetch('./projects/projects.json');
  const data = await res.json();
  const container = document.getElementById('projects');

  data.forEach(p => {
    const div = document.createElement('div');
    div.className = 'project';
    div.innerHTML = `<h3>${p.title}</h3><p>${p.description}</p><iframe src="${p.embed}"></iframe>`;
    container.appendChild(div);
  });
}
loadProjects();
</script>

</body>
</html>
