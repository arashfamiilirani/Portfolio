<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #000; --text: #f5f5f7; --dim: #86868b; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; font-weight: 400; -webkit-font-smoothing: antialiased; 
        }
        
        /* Slick, minimal header */
        header { 
            position: fixed; top: 0; width: 100%; padding: 30px 50px; 
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; mix-blend-mode: difference; box-sizing: border-box;
        }
        .logo { font-size: 0.85rem; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 500; }

        /* The Canvas */
        .container { max-width: 1000px; margin: 0 auto; padding: 250px 40px 150px; }
        .module { margin-bottom: 180px; animation: fadeIn 1s ease-out; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Yulia-style Massive Typography */
        .text_block h1 { font-size: clamp(3.5rem, 8vw, 6rem); font-weight: 200; line-height: 1.05; letter-spacing: -0.03em; margin-bottom: 40px; }
        .text_block h2 { font-size: 1.5rem; color: var(--dim); margin-top: 60px; font-weight: 400; }
        .text_block p { font-size: 1.25rem; line-height: 1.6; color: #a1a1a6; max-width: 700px; margin-bottom: 30px; }
        .text_block blockquote { border-left: 1px solid #333; padding-left: 30px; font-size: 1.8rem; font-weight: 200; color: #fff; margin: 60px 0; }

        /* Media Presentation */
        iframe { 
            width: 100%; aspect-ratio: 16/9; border: none; 
            background: #0a0a0a; filter: grayscale(100%); transition: filter 0.8s ease; 
        }
        iframe:hover { filter: grayscale(0%); }
        .audio_block iframe { aspect-ratio: auto; height: 166px; margin-bottom: 10px; }
        
        .caption { font-size: 0.75rem; color: var(--dim); margin-top: 15px; letter-spacing: 0.05em; text-transform: uppercase; }
        
        @media (max-width: 768px) { header { padding: 20px; } .container { padding-top: 150px; } }
    </style>
</head>
<body>
    <header><div class="logo" id="logo-text"></div></header>
    <main class="container" id="content-modules"></main>

    <script>
        async function buildSite() {
            try {
                const res = await fetch('/content/settings.json');
                const data = await res.json();
                document.getElementById('logo-text').textContent = data.site_name;
                const content = document.getElementById('content-modules');

                (data.modules || []).forEach(m => {
                    const section = document.createElement('section');
                    section.className = `module ${m.type}`;
                    
                    if (m.type === 'text_block') {
                        section.innerHTML = marked.parse(m.body || '');
                    } else if (m.type === 'video_block') {
                        section.innerHTML = `<iframe src="${m.url}"></iframe><div class="caption">${m.caption || ''}</div>`;
                    } else if (m.type === 'audio_block') {
                        const tracks = (m.items || []).map(t => `
                            <div style="margin-bottom: 50px;">
                                <iframe src="${t.url}"></iframe>
                                <div class="caption">${t.caption || ''}</div>
                            </div>
                        `).join('');
                        section.innerHTML = tracks;
                    }
                    content.appendChild(section);
                });
            } catch(e) { console.warn("Awaiting CMS publish..."); }
        }
        buildSite();
    </script>
</body>
</html>
