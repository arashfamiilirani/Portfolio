<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arash Irani | Sound Artist</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #f1f704; /* Matches your dashboard yellow */
            --text: #ffffff;
            --card: #111111;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 5vw;
            line-height: 1.6;
        }
        header {
            border-bottom: 1px solid #222;
            margin-bottom: 50px;
            padding-bottom: 20px;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }
        .card {
            background: var(--card);
            border: 1px solid #222;
            padding: 20px;
            transition: 0.3s;
        }
        .card:hover {
            border-color: var(--accent);
        }
        .tag {
            background: var(--accent);
            color: #000;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        iframe {
            width: 100%;
            border: none;
            margin: 15px 0;
        }
    </style>
</head>
<body>

<header>
    <h1>ARASH IRANI</h1>
    <p>Sound Artist / Composer / Montreal, QC</p>
    <div class="nav-links">
        <a href="#sound">Sound</a>
        <a href="#photo">Photography</a>
        <a href="#bio">Bio & CV</a>
    </div>
</header>

<div class="grid" id="main-grid">
    <div class="card">
        <span class="tag">Sound Design</span>
        <h3>Atmospheric Space Ambience</h3>
        <p>High-fidelity 96kHz 24-bit soundscape.</p>
    </div>
</div>

<script>
    // This script makes the dashboard colors work
    async function initSite() {
        try {
            const res = await fetch('/content/settings.json');
            const settings = await res.json();
            if(settings.accent) document.documentElement.style.setProperty('--accent', settings.accent);
            if(settings.css) {
                const style = document.createElement('style');
                style.textContent = settings.css;
                document.head.appendChild(style);
            }
        } catch(e) { console.log("Using default settings"); }
    }
    initSite();
</script>

</body>
</html>
