<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Admin Panel</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // This forces the CMS to look at your Netlify site even if DNS is still propagating
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
      // MANUALLY SET THE SITE URL (Replace with your actual netlify app URL if arashfamiilirani.com fails)
      localStorage.setItem("netlifySiteURL", "https://arashfamiilirani.com");
    </script>
  </body>
</html>
