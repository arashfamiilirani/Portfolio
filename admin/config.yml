backend:
  name: github
  repo: your-github-username/your-repo-name # Replace with YOUR username and repo name
  branch: main
  site_domain: arashfamiilirani.com
  base_url: https://arashfamiilirani.com
  auth_endpoint: https://gatekeeper-arash.vercel.app # We will set this up next

# THIS LINE STOPS THE ERROR:
search: false

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "projects"
    label: "My Portfolio"
    folder: "projects"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Media Link", name: "embed", widget: "string", required: false}
      - {label: "Upload File", name: "file", widget: "file", required: false}
