backend:
  name: github
  repo: arashfamiilirani/portfolio
  branch: main
  # REMOVE your domain from here to fix the 404
  base_url: https://gatekeeper-v2.vercel.app 
  auth_endpoint: /api/auth

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "content"
    label: "Editorial Content"
    files:
      - name: "home"
        label: "Homepage"
        file: "content/settings.json"
        fields:
          - { label: "Site Name", name: "site_name", widget: "string" }
          - { label: "Main Heading", name: "heading", widget: "string" }
          - { label: "Bio / Intro", name: "bio", widget: "markdown" }
          - label: "Work Items"
            name: "projects"
            widget: "list"
            fields:
              - { label: "Project Title", name: "title", widget: "string" }
              - { label: "Media URL (YouTube/SoundCloud)", name: "url", widget: "string" }
