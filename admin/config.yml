backend:
  name: github
  repo: arashfamiilirani/portfolio
  branch: main
  base_url: https://www.arashfamiilirani.com
  auth_endpoint: /api/auth

media_folder: "assets/img"
public_folder: "/assets/img"

# THIS turns off the split-screen, giving you a full-width "Blogger/Google Docs" canvas
editor:
  preview: false

collections:
  - name: "pages"
    label: "Site Builder (Drag & Drop)"
    files:
      - name: "home"
        label: "Main Page"
        file: "content/settings.json"
        fields:
          - { label: "Brand / Logo Name", name: "site_name", widget: "string" }
          - label: "Page Sections"
            name: "modules"
            widget: "list"
            summary: '{{fields.type}}'
            types:
              - label: "Rich Text (Google Docs Style)"
                name: "text_block"
                fields:
                  - { label: "Section Label (For your eyes only)", name: "title", widget: "string" }
                  - label: "Content"
                    name: "body"
                    widget: "markdown"
                    default_view: "visual"
                    minimal: false
                    buttons: ["heading-one", "heading-two", "bold", "italic", "quote", "link", "bulleted-list"]
              
              - label: "Cinematic Video"
                name: "video_block"
                fields:
                  - { label: "Video URL (Vimeo/YouTube)", name: "url", widget: "string" }
                  - { label: "Caption", name: "caption", widget: "string", required: false }

              - label: "Audio / Soundscape Grid"
                name: "audio_block"
                fields:
                  - label: "Audio Tracks"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "SoundCloud Embed URL", name: "url", widget: "string" }
                      - { label: "Track Details (e.g., 96kHz 24-bit WAV)", name: "caption", widget: "string", required: false }
