backend:
  name: github
  repo: arashfamiilirani/portfolio
  branch: main
  base_url: https://www.arashfamiilirani.com
  auth_endpoint: /api/auth

media_folder: "assets/img"
public_folder: "/assets/img"

editor:
  preview: false   # We'll use our own custom preview

collections:
  - name: "pages"
    label: "Site Builder (Drag & Drop)"
    files:
      - name: "home"
        label: "Main Page"
        file: "content/settings.json"
        fields:
          # ----- SITE NAME -----
          - { label: "Site Name (Logo)", name: "site_name", widget: "string", hint: "Appears in header" }

          # ----- THEME SETTINGS -----
          - label: "Theme Settings"
            name: "theme"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Background Color", name: "bg", widget: "color", default: "#ffffff" }
              - { label: "Text Color", name: "text", widget: "color", default: "#111111" }
              - { label: "Accent Color (hover links)", name: "accent", widget: "color", default: "#000000" }
              - { 
                  label: "Heading Font", 
                  name: "heading_font", 
                  widget: "select", 
                  options: ["Cormorant Garamond, serif", "Georgia, serif", "Playfair Display, serif"], 
                  default: "Cormorant Garamond, serif" 
                }
              - { 
                  label: "Body Font", 
                  name: "body_font", 
                  widget: "select", 
                  options: ["Inter, sans-serif", "Helvetica, sans-serif", "Open Sans, sans-serif"], 
                  default: "Inter, sans-serif" 
                }
              - { label: "Heading Size (e.g., 4.5rem)", name: "heading_size", widget: "string", default: "4.5rem" }

          # ----- SOCIAL MEDIA LINKS -----
          - label: "Social Links (header icons)"
            name: "social_links"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Instagram URL", name: "instagram", widget: "string", required: false, hint: "e.g., https://instagram.com/..." }
              - { label: "YouTube URL", name: "youtube", widget: "string", required: false }
              - { label: "SoundCloud URL", name: "soundcloud", widget: "string", required: false }
              - { label: "Spotify URL", name: "spotify", widget: "string", required: false }
              - { label: "Email (optional)", name: "email", widget: "string", required: false }

          # ----- PAGE SECTIONS (DRAG & DROP) -----
          - label: "Page Sections (reorder by dragging)"
            name: "sections"
            widget: "list"
            summary: '{{fields.title}} ({{fields.type}})'
            types:
              # Bio / CV section
              - label: "Bio / CV"
                name: "bio"
                fields:
                  - { label: "Section Title (shown in menu)", name: "title", widget: "string", default: "Bio / CV", required: true }
                  - { label: "Content", name: "body", widget: "markdown", default_view: "visual", buttons: ["heading-one", "heading-two", "bold", "italic", "quote", "link", "bulleted-list"] }

              # Video Reel section (grid of videos)
              - label: "Video Reel"
                name: "video_reel"
                fields:
                  - { label: "Section Title", name: "title", widget: "string", default: "Video Reels", required: true }
                  - label: "Videos"
                    name: "videos"
                    widget: "list"
                    fields:
                      - { label: "Video URL (YouTube/Vimeo embed link)", name: "url", widget: "string" }
                      - { label: "Caption", name: "caption", widget: "string", required: false }

              # Music section (grid of audio embeds)
              - label: "Music"
                name: "music"
                fields:
                  - { label: "Section Title", name: "title", widget: "string", default: "Music", required: true }
                  - label: "Tracks"
                    name: "tracks"
                    widget: "list"
                    fields:
                      - { label: "Embed URL (SoundCloud/Spotify)", name: "url", widget: "string" }
                      - { label: "Track Details", name: "caption", widget: "string", required: false }

              # Sound Design section (another audio grid, but you can rename)
              - label: "Sound Design"
                name: "sound_design"
                fields:
                  - { label: "Section Title", name: "title", widget: "string", default: "Sound Design", required: true }
                  - label: "Sound Pieces"
                    name: "tracks"
                    widget: "list"
                    fields:
                      - { label: "Embed URL", name: "url", widget: "string" }
                      - { label: "Details", name: "caption", widget: "string", required: false }

              # Contact section
              - label: "Contact"
                name: "contact"
                fields:
                  - { label: "Section Title", name: "title", widget: "string", default: "Contact", required: true }
                  - { label: "Contact Text (optional)", name: "text", widget: "markdown", required: false, hint: "e.g., For inquiries, email me at ..." }

              # Custom: you can add more types later, e.g., "image_gallery", "testimonial", etc.
