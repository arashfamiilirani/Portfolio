backend:
  name: github
  repo: arashfamiilirani/portfolio
  branch: main
  base_url: https://www.arashfamiilirani.com
  auth_endpoint: /api/auth

media_folder: "assets/img"
public_folder: "/assets/img"

editor:
  preview: false

collections:
  - name: "pages"
    label: "Site Builder (Drag & Drop)"
    files:
      - name: "home"
        label: "Main Page"
        file: "content/settings.json"
        fields:
          - { label: "Site Name (Logo)", name: "site_name", widget: "string", hint: "Appears in header" }

          # ----- HERO IMAGE -----
          - label: "Hero Image (Homepage Background)"
            name: "hero"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Image", name: "image", widget: "image", hint: "Upload a large landscape image" }
              - { label: "Credit (optional)", name: "credit", widget: "string", required: false }

          # ----- THEME SETTINGS -----
          - label: "Theme Settings"
            name: "theme"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Background Color", name: "bg", widget: "color", default: "#ffffff" }
              - { label: "Text Color", name: "text", widget: "color", default: "#111111" }
              - { label: "Accent Color", name: "accent", widget: "color", default: "#000000" }
              - { label: "Heading Font", name: "heading_font", widget: "select", options: ["Cormorant Garamond, serif", "Georgia, serif", "Playfair Display, serif"], default: "Cormorant Garamond, serif" }
              - { label: "Body Font", name: "body_font", widget: "select", options: ["Inter, sans-serif", "Helvetica, sans-serif", "Open Sans, sans-serif"], default: "Inter, sans-serif" }
              - { label: "Heading Size (e.g., 4.5rem)", name: "heading_size", widget: "string", default: "4.5rem" }

          # ----- SOCIAL LINKS -----
          - label: "Social Links (header icons)"
            name: "social_links"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
              - { label: "YouTube URL", name: "youtube", widget: "string", required: false }
              - { label: "SoundCloud URL", name: "soundcloud", widget: "string", required: false }
              - { label: "Spotify URL", name: "spotify", widget: "string", required: false }
              - { label: "Email", name: "email", widget: "string", required: false }

          # ----- PAGE SECTIONS (TABS) -----
          - label: "Page Sections (tabs)"
            name: "sections"
            widget: "list"
            summary: '{{fields.title}} ({{fields.type}})'
            types:
              - label: "Bio / CV"
                name: "bio"
                fields:
                  - { label: "Section Title", name: "title", widget: "string", default: "Bio / CV", required: true }
                  - { label: "Content", name: "body", widget: "markdown", default_view: "visual" }

              - label: "Video Reel"
                name: "video_reel"
                fields:
                  - { label: "Section Title", name: "title", widget: "string", default: "Video Reels", required: true }
                  - { label: "Layout", name: "layout", widget: "select", options: ["grid", "list"], default: "grid", hint: "How videos are arranged" }
                  - label: "Videos"
                    name: "videos"
                    widget: "list"
                    fields:
                      - { label: "Video Embed URL", name: "url", widget: "string", hint: "Use embed URL (e.g., https://www.youtube.com/embed/...)" }
                      - { label: "Caption", name: "caption", widget: "string", required: false }

              - label: "Music"
                name: "music"
                fields:
                  - { label: "Section Title", name: "title", widget: "string", default: "Music", required: true }
                  - { label: "Layout", name: "layout", widget: "select", options: ["grid", "list"], default: "list", hint: "Grid shows multiple tracks side by side (not recommended for audio)" }
                  - label: "Tracks"
                    name: "tracks"
                    widget: "list"
                    fields:
                      - { label: "Embed URL (SoundCloud/Spotify)", name: "url", widget: "string" }
                      - { label: "Details", name: "caption", widget: "string", required: false }

              - label: "Sound Design"
                name: "sound_design"
                fields:
                  - { label: "Section Title", name: "title", widget: "string", default: "Sound Design", required: true }
                  - { label: "Layout", name: "layout", widget: "select", options: ["grid", "list"], default: "list" }
                  - label: "Sound Pieces"
                    name: "tracks"
                    widget: "list"
                    fields:
                      - { label: "Embed URL", name: "url", widget: "string" }
                      - { label: "Details", name: "caption", widget: "string", required: false }

              - label: "Contact"
                name: "contact"
                fields:
                  - { label: "Section Title", name: "title", widget: "string", default: "Contact", required: true }
                  - { label: "Contact Text", name: "text", widget: "markdown", required: false }
