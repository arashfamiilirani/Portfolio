backend:
  name: github
  repo: arashfamiilirani/portfolio
  branch: main
  base_url: https://www.arashfamiilirani.com
  auth_endpoint: /api/auth

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "settings"
    label: "Site Builder"
    files:
      - name: "general"
        label: "Edit Editorial Content"
        file: "content/settings.json"
        fields:
          - { label: "Site Logo/Name", name: "site_name", widget: "string" }
          
          - label: "Page Modules"
            name: "modules"
            widget: "list"
            types:
              - label: "Editorial Text (Heading + Bio)"
                name: "text_block"
                fields:
                  - { label: "Menu Title", name: "menu_title", widget: "string", required: false }
                  - { label: "Large Heading", name: "heading", widget: "string", required: false }
                  - { label: "Body Text", name: "body", widget: "markdown", required: false }
                  - { label: "Alignment", name: "align", widget: "select", options: ["Left", "Center"], default: "Left" }

              - label: "Media Gallery (Videos/Audio)"
                name: "media_block"
                fields:
                  - { label: "Menu Title", name: "menu_title", widget: "string", required: false }
                  - { label: "Columns", name: "cols", widget: "select", options: ["1", "2"], default: "1" }
                  - label: "Items", name: "items", widget: "list", fields:
                    - { label: "Embed URL", name: "url", widget: "string" }
                    - { label: "Caption", name: "caption", widget: "string", required: false }
