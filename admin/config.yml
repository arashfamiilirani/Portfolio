backend:
  name: github
  repo: arashfamiilirani/portfolio
  branch: main
  base_url: https://www.arashfamiilirani.com
  auth_endpoint: /api/auth

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "settings"
    label: "Site Editor"
    files:
      - name: "general"
        label: "Edit Your Page"
        file: "content/settings.json"
        fields:
          - { label: "Website Name", name: "site_name", widget: "string", required: false }
          - { label: "Brand Color", name: "accent", widget: "color", default: "#f1f704", required: false }
          
          # THE NEW, EASY SECTION BUILDER
          - label: "Page Sections"
            name: "sections"
            widget: "list"
            required: false
            hint: "Click 'Add Page Sections' to create a new block on your website."
            fields:
              - { label: "Section Title (This automatically adds it to your Menu!)", name: "title", widget: "string", required: false }
              - { label: "Content Editor", name: "body", widget: "markdown", hint: "👉 Click 'Rich Text' in the top right to use the Word-style editor!", required: false }
              - { label: "Video/Audio Link (Optional)", name: "media_link", widget: "string", hint: "Paste a YouTube or SoundCloud URL here", required: false }
