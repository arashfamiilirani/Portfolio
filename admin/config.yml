backend:
  name: github
  repo: arashfamiilirani/portfolio
  branch: main
  # This tells the CMS to use your site, not Netlify, for the login
  base_url: https://www.arashfamiilirani.com
  auth_endpoint: /api/auth

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "content"
    label: "Website Content"
    files:
      - name: "home"
        label: "Homepage"
        file: "content/settings.json"
        fields:
          - { label: "Site Name", name: "site_name", widget: "string" }
          - { label: "Main Heading (Large)", name: "heading", widget: "string" }
          - { label: "Bio / Description", name: "bio", widget: "markdown" }
          - label: "Project Gallery"
            name: "projects"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "URL (YouTube/Vimeo/SoundCloud)", name: "url", widget: "string" }
