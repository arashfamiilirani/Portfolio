backend:
  name: github
  repo: arashfamiilirani/Portfolio # Replace with your actual GitHub username/repo
  branch: main

# THIS LINE STOPS THE ERROR:
search: false

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "projects"
    label: "My Portfolio"
    folder: "projects"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Media Link", name: "embed", widget: "string", required: false}
      - {label: "Upload File", name: "file", widget: "file", required: false}
