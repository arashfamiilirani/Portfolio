backend:
  name: github
  repo: arashfamiilirani/portfolio
  branch: main
  base_url: https://www.arashfamiilirani.com
  auth_endpoint: /api/auth

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "pages"
    label: "Editorial Pages"
    files:
      - name: "home"
        label: "Home Page"
        file: "content/settings.json"
        fields:
          - { label: "Site Logo Name", name: "site_name", widget: "string" }
          - label: "Page Modules"
            name: "modules"
            widget: "list"
            summary: '{{fields.type}}'
            types:
              - label: "Text Module (Intro/Quotes)"
                name: "text_block"
                fields:
                  - { label: "Heading", name: "title", widget: "string", required: false }
                  - { label: "Body Copy", name: "body", widget: "markdown" }
                  - { label: "Alignment", name: "align", widget: "select", options: ["left", "center", "right"], default: "left" }
              
              - label: "Media Module (Video/Audio)"
                name: "media_block"
                fields:
                  - { label: "Module Label", name: "label", widget: "string", required: false }
                  - { label: "Columns", name: "cols", widget: "select", options: ["1", "2"], default: "1" }
                  - label: "Items"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "URL", name: "url", widget: "string" }
                      - { label: "Caption", name: "caption", widget: "string", required: false }
