backend:
  name: github
  repo: arashfamiilirani/portfolio
  branch: main
  base_url: https://www.arashfamiilirani.com
  auth_endpoint: /api/auth

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "settings"
    label: "Global Site Content"
    files:
      - name: "general"
        label: "Edit Everything"
        file: "content/settings.json"
        fields:
          - { label: "Main Name", name: "site_name", widget: "string" }
          - { label: "Professional Title", name: "site_title", widget: "string", hint: "e.g. Sound Artist / Composer" }
          - { label: "Location", name: "location", widget: "string" }
          - { label: "Short Bio", name: "bio_text", widget: "text" }
          - { label: "Accent Color", name: "accent", widget: "color" }
          - { label: "Custom CSS", name: "css", widget: "code", default_language: "css" }
